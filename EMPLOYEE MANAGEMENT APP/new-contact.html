<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Employee</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <h2>Employee Hub</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="new-contact.html">New Contact</a></li>
        <li><a href="view-contacts.html">View Contacts</a></li>
    </ul>
</nav>

<section class="container">
    <h1 style="color: aliceblue;">Add New Employee</h1>

    <form id="employeeForm">
        <input type="text" placeholder="Full Name" id="name" required>
        <input type="email" placeholder="Email" id="email" required>
        <input type="text" placeholder="Phone Number" id="phone" required>
        <input type="text" placeholder="Department" id="department" required>
        <input type="text" placeholder="Position" id="position" required>

        <button type="submit">Save Employee</button>
    </form>
</section>

<script src="main.js"></script>
</body>
</html>
